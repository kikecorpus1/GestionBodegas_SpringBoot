<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockCore — Roles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="app">
  <div id="sidebarMount"></div>
  <main class="main">
    <div class="topbar">
      <span class="page-title">Roles</span>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openModal('modalRol');resetForm()">+ Nuevo Rol</button>
      </div>
    </div>
    <div class="page-body">
      <div class="card">
        <div class="toolbar">
          <div class="search-wrap">
            <input class="search-input" id="searchInput" placeholder="Buscar rol..." oninput="filterTable()">
          </div>
          <button class="btn btn-outline btn-sm" onclick="load()">🔄</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr></thead>
            <tbody id="tableBody">
              <tr><td colspan="3"><div class="loader-wrap"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalRol">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Nuevo Rol</span>
      <button class="modal-close" onclick="closeModal('modalRol')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Nombre del Rol</label>
          <input type="text" class="form-control" id="fNombre" placeholder="ADMIN, SUPERVISOR, OPERARIO...">
        </div>
        <div class="form-group full">
          <label class="form-label">Descripción</label>
          <textarea class="form-control" id="fDesc" rows="3" placeholder="Describe los permisos de este rol..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modalRol')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="shared.js"></script>
<script>
  requireAuth();
  document.getElementById('sidebarMount').innerHTML = getSidebarHTML();
  initSidebar();
  let allData = [], editId = null;

  async function load() {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="3"><div class="loader-wrap"><div class="spinner"></div></div></td></tr>';
    try { allData = await API.get('/api/rol'); renderTable(allData); }
    catch(e) { toast(e.message,'danger'); }
  }

  function renderTable(data) {
    if (!data.length) {
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="3"><div class="empty-state"><div class="empty-icon">🔑</div>Sin roles</div></td></tr>';
      return;
    }
    document.getElementById('tableBody').innerHTML = data.map(r => `
      <tr>
        <td><span class="badge badge-info">${r.nombre}</span></td>
        <td style="color:var(--slate)">${r.descripcion||'—'}</td>
        <td><div class="flex gap-2">
          <button class="btn btn-outline btn-sm" onclick="editar(${r.idRol})">✏️</button>
          <button class="btn btn-danger btn-sm"  onclick="eliminar(${r.idRol})">🗑</button>
        </div></td>
      </tr>`).join('');
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderTable(allData.filter(r => (r.nombre+r.descripcion||'').toLowerCase().includes(q)));
  }

  function resetForm() { editId=null; document.getElementById('modalTitle').textContent='Nuevo Rol'; document.getElementById('fNombre').value=''; document.getElementById('fDesc').value=''; }

  async function editar(id) {
    const r = allData.find(x=>x.idRol===id); if(!r) return;
    editId=id; document.getElementById('modalTitle').textContent='Editar Rol';
    document.getElementById('fNombre').value = r.nombre;
    document.getElementById('fDesc').value   = r.descripcion||'';
    openModal('modalRol');
  }

  async function guardar() {
    const body = { nombre: document.getElementById('fNombre').value.trim(), descripcion: document.getElementById('fDesc').value.trim() };
    if (!body.nombre) { toast('El nombre del rol es requerido','warning'); return; }
    try {
      editId ? await API.put(`/api/rol/${editId}`,body) : await API.post('/api/rol',body);
      toast(`Rol ${editId?'actualizado':'creado'}`,'success');
      closeModal('modalRol'); load();
    } catch(e) { toast(e.message,'danger'); }
  }

  async function eliminar(id) {
    if (!confirmAction('¿Eliminar este rol?')) return;
    try { await API.delete(`/api/rol/${id}`); toast('Eliminado','success'); load(); }
    catch(e) { toast(e.message,'danger'); }
  }

  load();
</script>
</body>
</html>
