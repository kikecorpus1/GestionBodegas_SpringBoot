<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockCore — Personas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="app">
  <div id="sidebarMount"></div>
  <main class="main">
    <div class="topbar">
      <span class="page-title">Personas</span>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openModal('modalPersona');resetForm()">+ Nueva Persona</button>
      </div>
    </div>
    <div class="page-body">
      <div class="card">
        <div class="toolbar">
          <div class="search-wrap">
            <input class="search-input" id="searchInput" placeholder="Buscar nombre o documento..." oninput="filterTable()">
          </div>
          <select class="form-control" id="filterTipo" onchange="filterTable()" style="width:180px">
            <option value="">Todos los tipos</option>
            <option>CC</option>
            <option>CE</option>
            <option>PASAPORTE</option>
            <option>NIT</option>
            <option>TI</option>
          </select>
          <button class="btn btn-outline btn-sm" onclick="load()">🔄</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Nombre</th><th>Apellido</th><th>Tipo Doc.</th><th>Número Doc.</th><th>Acciones</th>
            </tr></thead>
            <tbody id="tableBody">
              <tr><td colspan="5"><div class="loader-wrap"><div class="spinner"></div> Cargando...</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalPersona">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Nueva Persona</span>
      <button class="modal-close" onclick="closeModal('modalPersona')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" id="fNombre" placeholder="Juan">
        </div>
        <div class="form-group">
          <label class="form-label">Apellido</label>
          <input type="text" class="form-control" id="fApellido" placeholder="Pérez">
        </div>
        <div class="form-group">
          <label class="form-label">Tipo de Documento</label>
          <select class="form-control" id="fTipo">
            <option>CC</option>
            <option>CE</option>
            <option>PASAPORTE</option>
            <option>NIT</option>
            <option>TI</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Número de Documento</label>
          <input type="text" class="form-control" id="fNumDoc" placeholder="1234567890">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modalPersona')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="shared.js"></script>
<script>
  requireAuth();
  document.getElementById('sidebarMount').innerHTML = getSidebarHTML();
  initSidebar();

  const role = getUserRole();
  const canEdit = role === 'ADMIN';

  let allData = [], editId = null;

  async function load() {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="5"><div class="loader-wrap"><div class="spinner"></div></div></td></tr>';
    try {
      allData = await API.get('/api/persona');
      renderTable(allData);
    } catch(e) { toast(e.message, 'danger'); }
  }

  function renderTable(data) {
    if (!data.length) {
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">👤</div>Sin personas registradas</div></td></tr>';
      return;
    }
    document.getElementById('tableBody').innerHTML = data.map(p => `
      <tr>
        <td><strong>${p.nombre}</strong></td>
        <td>${p.apellido}</td>
        <td><span class="badge badge-info">${p.tipoDocumento}</span></td>
        <td style="color:var(--slate)">${p.numeroDocumento}</td>
        <td><div class="flex gap-2">
          ${canEdit ? `
          <button class="btn btn-outline btn-sm" onclick="editar(${p.idPersona})">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="eliminar(${p.idPersona})">🗑</button>` : ''}
        </div></td>
      </tr>`).join('');
  }

  function filterTable() {
    const q    = document.getElementById('searchInput').value.toLowerCase();
    const tipo = document.getElementById('filterTipo').value;
    renderTable(allData.filter(p =>
      (!q    || (p.nombre + p.apellido + p.numeroDocumento).toLowerCase().includes(q)) &&
      (!tipo || p.tipoDocumento === tipo)
    ));
  }

  function resetForm() {
    editId = null;
    document.getElementById('modalTitle').textContent = 'Nueva Persona';
    ['fNombre', 'fApellido', 'fNumDoc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fTipo').value = 'CC';
  }

  async function editar(id) {
    const p = allData.find(x => x.idPersona === id); if (!p) return;
    editId = id;
    document.getElementById('modalTitle').textContent = 'Editar Persona';
    document.getElementById('fNombre').value   = p.nombre;
    document.getElementById('fApellido').value = p.apellido;
    document.getElementById('fTipo').value     = p.tipoDocumento;
    document.getElementById('fNumDoc').value   = p.numeroDocumento;
    openModal('modalPersona');
  }

  async function guardar() {
    const body = {
      nombre:          document.getElementById('fNombre').value.trim(),
      apellido:        document.getElementById('fApellido').value.trim(),
      tipoDocumento:   document.getElementById('fTipo').value,
      numeroDocumento: document.getElementById('fNumDoc').value.trim()
    };
    if (!body.nombre || !body.apellido || !body.numeroDocumento) {
      toast('Nombre, apellido y documento son requeridos', 'warning'); return;
    }
    try {
      editId
        ? await API.put(`/api/persona/${editId}`, body)
        : await API.post('/api/persona', body);
      toast(`Persona ${editId ? 'actualizada' : 'creada'}`, 'success');
      closeModal('modalPersona');
      load();
    } catch(e) { toast(e.message, 'danger'); }
  }

  async function eliminar(id) {
    if (!confirmAction('¿Eliminar esta persona?')) return;
    try {
      await API.delete(`/api/persona/${id}`);
      toast('Eliminada', 'success');
      load();
    } catch(e) { toast(e.message, 'danger'); }
  }

  load();
</script>
</body>
</html>
