<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockCore — Productos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="app">
  <div id="sidebarMount"></div>
  <main class="main">
    <div class="topbar">
      <span class="page-title">Productos</span>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" id="btnNuevoProducto" onclick="openModal('modalProd');resetForm()">+ Nuevo Producto</button>
      </div>
    </div>
    <div class="page-body">
      <div class="card">
        <div class="toolbar">
          <div class="search-wrap">
            <input class="search-input" id="searchInput" placeholder="Buscar nombre o código..." oninput="filterTable()">
          </div>
          <select class="form-control" id="filterCat" onchange="filterTable()" style="width:200px">
            <option value="">Todas las categorías</option>
          </select>
          <button class="btn btn-outline btn-sm" onclick="load()">🔄</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Nombre</th><th>Código</th><th>Unidad</th><th>Categoría</th><th>Acciones</th>
            </tr></thead>
            <tbody id="tableBody">
              <tr><td colspan="5"><div class="loader-wrap"><div class="spinner"></div> Cargando...</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalProd">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Nuevo Producto</span>
      <button class="modal-close" onclick="closeModal('modalProd')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Nombre del Producto</label>
          <input type="text" class="form-control" id="fNombre" placeholder="Ej: Laptop HP 15">
        </div>
        <div class="form-group">
          <label class="form-label">Código Único</label>
          <input type="text" class="form-control" id="fCodigo" placeholder="PROD-001">
        </div>
        <div class="form-group">
          <label class="form-label">Unidad de Medida</label>
          <input type="text" class="form-control" id="fUnidad" placeholder="UNIDAD, KG, LT...">
        </div>
        <div class="form-group full">
          <label class="form-label">Categoría</label>
          <select class="form-control" id="fCategoria"></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modalProd')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="shared.js"></script>
<script>
  requireAuth();
  document.getElementById('sidebarMount').innerHTML = getSidebarHTML();
  initSidebar();

  const role = getUserRole();
  const canEditProductos = role === 'ADMIN';

  // Ocultar botón nuevo si no puede editar
  if (!canEditProductos) {
    document.getElementById('btnNuevoProducto').style.display = 'none';
  }

  let allData = [], editId = null;

  async function load() {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="5"><div class="loader-wrap"><div class="spinner"></div></div></td></tr>';
    try {
      const [prods, cats] = await Promise.all([API.get('/api/producto'), API.get('/api/categoria')]);
      allData = prods;
      const catSel = document.getElementById('filterCat');
      catSel.innerHTML = '<option value="">Todas las categorías</option>' +
        cats.map(c => `<option value="${c.idCategoria}">${c.nombre}</option>`).join('');
      renderTable(prods);
    } catch(e) { toast(e.message,'danger'); }
  }

  function renderTable(data) {
    if (!data.length) {
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">🏷️</div>Sin productos</div></td></tr>';
      return;
    }
    document.getElementById('tableBody').innerHTML = data.map(p => `
      <tr>
        <td><strong>${p.nombre}</strong></td>
        <td><span class="badge badge-neutral">${p.codigo}</span></td>
        <td style="color:var(--slate)">${p.unidadMedida}</td>
        <td>${p.categoria?.nombre || '—'}</td>
        <td><div class="flex gap-2">
          ${canEditProductos ? `<button class="btn btn-outline btn-sm" onclick="editar(${p.idProducto})">✏️</button>
          <button class="btn btn-danger btn-sm"  onclick="eliminar(${p.idProducto})">🗑</button>` : ''}
        </div></td>
      </tr>`).join('');
  }

  function filterTable() {
    const q   = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('filterCat').value;
    renderTable(allData.filter(p =>
      (!q   || (p.nombre+p.codigo).toLowerCase().includes(q)) &&
      (!cat || String(p.categoria?.idCategoria) === cat)
    ));
  }

  async function loadCatSelect() {
    const cats = await API.get('/api/categoria');
    document.getElementById('fCategoria').innerHTML =
      cats.map(c => `<option value="${c.idCategoria}">${c.nombre}</option>`).join('');
  }

  function resetForm() { editId = null; document.getElementById('modalTitle').textContent = 'Nuevo Producto'; ['fNombre','fCodigo','fUnidad'].forEach(id => document.getElementById(id).value=''); loadCatSelect(); }

  async function editar(id) {
    const p = allData.find(x => x.idProducto === id); if (!p) return;
    editId = id;
    document.getElementById('modalTitle').textContent = 'Editar Producto';
    await loadCatSelect();
    document.getElementById('fNombre').value   = p.nombre;
    document.getElementById('fCodigo').value   = p.codigo;
    document.getElementById('fUnidad').value   = p.unidadMedida;
    document.getElementById('fCategoria').value= p.categoria?.idCategoria;
    openModal('modalProd');
  }

  async function guardar() {
    const body = {
      nombre:       document.getElementById('fNombre').value.trim(),
      codigo:       document.getElementById('fCodigo').value.trim(),
      unidadMedida: document.getElementById('fUnidad').value.trim(),
      categoriaId:  Number(document.getElementById('fCategoria').value)
    };
    if (!body.nombre || !body.codigo) { toast('Nombre y código son requeridos','warning'); return; }
    try {
      editId ? await API.put(`/api/producto/${editId}`, body) : await API.post('/api/producto', body);
      toast(`Producto ${editId?'actualizado':'creado'}`,'success');
      closeModal('modalProd'); load();
    } catch(e) { toast(e.message,'danger'); }
  }

  async function eliminar(id) {
    if (!confirmAction('¿Eliminar este producto?')) return;
    try { await API.delete(`/api/producto/${id}`); toast('Eliminado','success'); load(); }
    catch(e) { toast(e.message,'danger'); }
  }

  load();
</script>
</body>
</html>
